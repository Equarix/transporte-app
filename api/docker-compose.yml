version: "3"

services:
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USER=${DB_USER:-sa}
      - DB_PASSWORD=${DB_PASSWORD:-123}
      - DB_NAME=${DB_NAME:-transporte}
      - JWT_SECRET=${JWT_SECRET:-TuSecretoJWT}
      - PORT=5000
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - IA_API_URL=${IA_API_URL:-http://ia:8000}
      - IA_INTERNAL_KEY=${IA_INTERNAL_KEY:-internal-secret-key-change-in-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

networks:
  default:
    name: entrafesa-network
