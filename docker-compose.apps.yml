version: "3"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USER=${DB_USER:-usersql}
      - DB_PASSWORD=${DB_PASSWORD:-123}
      - DB_NAME=${DB_NAME:-transporte}
      - JWT_SECRET=${JWT_SECRET:-TuSecretoJWT}
      - PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - IA_API_URL=http://ia:8000
      - IA_INTERNAL_KEY=${IA_INTERNAL_KEY:-internal-secret-key-change-in-production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

  api-sales:
    build:
      context: .
      dockerfile: api-sales/Dockerfile
    restart: always
    ports:
      - "5001:5001"
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-1433}
      - DB_USER=${DB_USER:-usersql}
      - DB_PASSWORD=${DB_PASSWORD:-123}
      - DB_NAME=${DB_NAME_SALES:-transporte_sales}
      - PORT=5001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default

  ia:
    build:
      context: ./ia
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - CHATWOOT_BASE_URL=http://chatwoot:3000
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - MAIN_API_URL=http://api:5000/api
      - BOT_DOCUMENT_TYPE=${BOT_DOCUMENT_TYPE:-DNI}
      - BOT_DOCUMENT_NUMBER=${BOT_DOCUMENT_NUMBER:-99999999}
      - BOT_PASSWORD=${BOT_PASSWORD:-botpassword123}
      - BOT_FIRST_NAME=${BOT_FIRST_NAME:-Bot}
      - BOT_LAST_NAME=${BOT_LAST_NAME:-Entrafesa}
      - BOT_EMAIL=${BOT_EMAIL:-bot@entrafesa.com}
      - BOT_PHONE=${BOT_PHONE:-999999999}
      - BOT_DATE_OF_BIRTH=${BOT_DATE_OF_BIRTH:-2000-01-01}
      - INTERNAL_SECRET_KEY=${INTERNAL_SECRET_KEY:-internal-secret-key-change-in-production}
    depends_on:
      - api
    networks:
      - default

networks:
  default:
    name: entrafesa-network
